name: Python

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION=$(bash scripts/compute-version.sh)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest wheel setuptools
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --exclude deps --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --exclude deps --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Build and install
        run: python -m pip install .
      - name: Test with pytest
        run: pytest python/ --junitxml=pytest.xml
      - name: upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: opencc-${{ env.VERSION }}-python-${{ matrix.python-version }}
          path: |
            pytest.xml

  test-pypi:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION=$(bash scripts/compute-version.sh)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Build package and upload from docker (Linux)
        if: runner.os == 'Linux'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          docker run --rm -v "${PWD}:/opt/OpenCC" \
            -e TWINE_USERNAME \
            -e TWINE_PASSWORD \
            -e VERSION=${VERSION} \
            ubuntu:22.04 /bin/bash /opt/OpenCC/release-pypi-linux.sh testonly

      - name: Build package and upload (macOS)
        if: runner.os == 'macOS'
        run: bash release-pypi-macos.sh testonly
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Build package and upload (Windows)
        if: runner.os == 'Windows'
        run: |
          C:\Miniconda/condabin/conda.bat init powershell
          ./release-pypi-windows.cmd testonly
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      - name: upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: opencc-${{ env.VERSION }}-pypi-${{ matrix.os }}
          path: |
            dist/**
