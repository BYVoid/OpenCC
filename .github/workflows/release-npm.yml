name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_beta:
        description: Publish with the npm beta dist-tag
        required: true
        type: boolean
        default: false
      beta_version:
        description: Beta version to write to package.json, for example 1.3.2-beta.0
        required: false
        type: string
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        type: boolean
        default: true

jobs:
  publish-npm:
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Prepare beta package version
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_beta }}
        shell: bash
        env:
          BETA_VERSION: ${{ inputs.beta_version }}
        run: |
          if [ -z "$BETA_VERSION" ]; then
            echo "beta_version is required when publish_beta is true"
            exit 1
          fi
          npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build Node.js prebuilds
        run: npm run prebuild:all

      - name: Verify Node.js prebuilds
        run: |
          test -f prebuilds/assets/s2t.json
          test -f prebuilds/darwin-arm64/opencc.node
          test -f prebuilds/linux-x64/opencc.node
          test -f prebuilds/linux-arm64/opencc.node

      - name: Test
        env:
          PREBUILDS_ONLY: 1
        run: npm test

      - name: Publish
        env:
          PUBLISH_BETA: ${{ inputs.publish_beta }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          publish_args=(--provenance)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$DRY_RUN" = "true" ]; then
            publish_args+=(--dry-run)
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$PUBLISH_BETA" = "true" ]; then
            npm publish --tag beta "${publish_args[@]}"
          else
            npm publish "${publish_args[@]}"
          fi
