name: Publish npm packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package_version:
        description: Version to write to package.json before publishing, for example 1.3.2-beta.0 or 1.3.2-next.1
        required: false
        type: string
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        type: boolean
        default: true
      upload_npm_debug_logs:
        description: Upload sanitized npm debug logs when a job fails; logs may still contain sensitive data
        required: true
        type: boolean
        default: false

jobs:
  publish-jieba-binaries:
    name: Publish opencc-jieba binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
            library: libopencc-jieba.dylib
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            library: libopencc-jieba.so
          - target: linux-x64
            runner: ubuntu-24.04
            library: libopencc-jieba.so
          - target: win32-x64
            runner: windows-2025
            library: opencc-jieba.dll

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Prepare package versions
        shell: bash
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node - "$PACKAGE_VERSION" "$RELEASE_TAG" <<'NODE'
          const fs = require('fs');
          const requestedVersion = (process.argv[2] || process.argv[3] || '')
            .replace(/^ver\./, '')
            .replace(/^v(?=\d)/, '');
          function updatePackage(file, optionalPrefix) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            const version = requestedVersion || pkg.version;
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const name of Object.keys(pkg.optionalDependencies)) {
                if (name.startsWith(optionalPrefix)) {
                  pkg.optionalDependencies[name] = version;
                }
              }
            }
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          updatePackage('plugins/jieba/node/package.json', '@opencc/opencc-jieba-');
          NODE

      - name: Build opencc-jieba binary
        shell: bash
        run: |
          cd plugins/jieba/node
          npm run build -- "${{ matrix.target }}"
          test -f "prebuilds/${{ matrix.target }}/${{ matrix.library }}"

      - name: Prepare scoped package
        shell: bash
        run: |
          cd plugins/jieba/node
          npm run prepare:scoped-packages
          npm pack --dry-run "dist/scoped-packages/@opencc/opencc-jieba-${{ matrix.target }}"

      - name: Pack scoped package
        shell: bash
        run: |
          mkdir -p plugins/jieba/node/dist/npm-artifacts
          npm pack "plugins/jieba/node/dist/scoped-packages/@opencc/opencc-jieba-${{ matrix.target }}" \
            --pack-destination plugins/jieba/node/dist/npm-artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-opencc-jieba-binary-${{ matrix.target }}
          path: plugins/jieba/node/dist/npm-artifacts/*.tgz
          if-no-files-found: error

      - name: Determine npm dist-tag
        id: npm_metadata
        shell: bash
        run: |
          version="$(node -p "require('./plugins/jieba/node/package.json').version")"
          tag="$(node -e "const version = process.argv[1]; const match = version.match(/-([0-9A-Za-z-]+)(?:[.+]|$)/); console.log(match ? match[1] : 'latest');" "$version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing @opencc/opencc-jieba-${{ matrix.target }}@$version with npm dist-tag '$tag'"

      - name: Publish scoped package
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          NPM_TAG: ${{ steps.npm_metadata.outputs.tag }}
        run: |
          publish_args=(--access public --provenance --loglevel verbose)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$DRY_RUN" = "true" ]; then
            publish_args+=(--dry-run)
          fi
          npm publish "plugins/jieba/node/dist/scoped-packages/@opencc/opencc-jieba-${{ matrix.target }}" --tag "$NPM_TAG" "${publish_args[@]}"

      - name: Collect npm debug logs
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.upload_npm_debug_logs }}
        shell: bash
        run: |
          cache_dir="$(npm config get cache)"
          mkdir -p npm-debug-logs
          if [ -d "$cache_dir/_logs" ]; then
            for log in "$cache_dir/_logs"/*-debug-*.log; do
              [ -f "$log" ] || continue
              sed -E \
                -e 's#(//[^[:space:]]+:_authToken=).+#\1[REDACTED]#g' \
                -e 's/(Authorization: Bearer )[A-Za-z0-9._~+\/=-]+/\1[REDACTED]/g' \
                -e 's/(npm_[A-Za-z0-9]{20,})/[REDACTED]/g' \
                "$log" > "npm-debug-logs/$(basename "$log")"
            done
          fi

      - name: Upload npm debug logs
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.upload_npm_debug_logs }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs-opencc-jieba-binary-${{ matrix.target }}
          path: npm-debug-logs/*.log
          if-no-files-found: warn

  publish-jieba:
    name: Publish opencc-jieba
